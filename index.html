<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PANDIYIN - Nature In Pack | Homemade Foods from Madurai</title>
    <meta name="description" content="Authentic homemade foods from Madurai. Traditional pickles, snacks, spice powders, and sweets. 100% natural, no preservatives." />
    <meta name="author" content="PANDIYIN" />
    <meta property="og:title" content="PANDIYIN - Nature In Pack" />
    <meta property="og:description" content="Authentic homemade foods from Madurai. 100% natural, no preservatives." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Preconnect to Supabase storage for faster banner image loading -->
    <link rel="preconnect" href="https://adgihdeigquuoozmvfai.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://adgihdeigquuoozmvfai.supabase.co" />

    <!-- Inline script: preload cached hero banner before React loads -->
    <script>
      (function() {
        try {
          var cached = localStorage.getItem('hero_banner_url');
          if (cached) {
            var link = document.createElement('link');
            link.rel = 'preload';
            link.as = 'image';
            link.href = cached;
            link.type = 'image/webp';
            link.fetchPriority = 'high';
            document.head.appendChild(link);
          }
        } catch(e) {}
      })();
    </script>

    <style>
      html, body, #root {
        height: 100%;
        background-color: hsl(var(--background));
      }
      /* Hero banner placeholder - prevents layout shift */
      .hero-banner-placeholder {
        width: 100%;
        height: 400px;
        background: linear-gradient(135deg, #f5f5f5 25%, #e8e8e8 50%, #f5f5f5 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }
      @media (min-width: 768px) { .hero-banner-placeholder { height: 500px; } }
      @media (min-width: 1024px) { .hero-banner-placeholder { height: 600px; } }
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <!-- Static placeholder shown until React hydrates - prevents layout shift -->
      <div class="hero-banner-placeholder" id="static-hero-placeholder"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
